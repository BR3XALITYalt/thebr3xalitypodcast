<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Br3xality Podcast</title>
  <style>
    @font-face {
      font-family: 'Cal Sans';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('https://codeberg.org/BR3XALITY/pages/raw/branch/main/fonts/Cal%20Sans.woff2') format('woff2');
    }
    @font-face {
      font-family: 'PeterMedium';
      src: url('https://codeberg.org/BR3XALITY/pages/raw/branch/main/fonts/petermedium.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    body {
      background: black;
      color: white;
      font-family: 'PeterMedium', sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Cal Sans', sans-serif;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 15px 0;
      font-size: 20px;
      font-family: 'PeterMedium', sans-serif;
    }
    a:hover {
      text-decoration: underline;
    }
    p {
      font-family: 'PeterMedium', sans-serif;
      line-height: 1.6;
      max-width: 600px;
      margin: 10px auto;
    }
    iframe {
      width: 400px;
      height: 120px;
      border: none;
      overflow: hidden;
    }
    .center {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .site-footer {
      margin-top: 40px;
      font-family: 'PeterMedium', sans-serif;
    }
    p + p {
      margin-top: 1.5em;
    }
    #notify-btn {
      display: inline-block;
      margin: 15px 0;
      padding: 10px 28px;
      font-family: 'PeterMedium', sans-serif;
      font-size: 20px;
      color: white;
      background: transparent;
      border: 1px solid white;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #notify-btn:hover {
      background: white;
      color: black;
    }
    #notify-btn:disabled {
      opacity: 0.4;
      cursor: default;
      background: transparent;
      color: white;
    }
    #notify-status {
      font-size: 16px;
      margin: 10px auto;
      max-width: 600px;
      min-height: 24px;
    }
  </style>
</head>
<body>

  <h1>The Br3xality Podcast</h1>

  <div class="center">
    <iframe
      src="https://creators.spotify.com/pod/profile/thebr3xalitypodcast/embed"
      height="102px"
      width="400px"
      frameborder="0"
      scrolling="no"
      title="The Br3xality Podcast player"
    ></iframe>
  </div>

  <p>The BR3XALITY Podcast is a Podcast about, well... all things BR3XALITY.</p>

  <button id="notify-btn">🔔 Notify me of new episodes</button>
  <p id="notify-status"></p>

  <div class="site-footer">
    <p>© 2025 The Br3xality Podcast</p>
  </div>

  <script>
    // !! Fill these in after deploying your Cloudflare Worker !!
    const WORKER_URL = 'https://br3xality-podcast.marioplays254.workers.dev';
    const VAPID_PUBLIC_KEY = 'BD8fFg94qbEQvq71CSgGa-IQYXEjegVEaXuwbEtalUrC1pLMfiNO9bzi4Ql3H51o-C3FCpNNvVrJFOsSsOz_8sI';

    const btn = document.getElementById('notify-btn');
    const status = document.getElementById('notify-status');

    function urlBase64ToUint8Array(b64) {
      const pad = '='.repeat((4 - b64.length % 4) % 4);
      const base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
      return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    }

    async function handleSubscribe() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        status.textContent = 'Push notifications are not supported in this browser.';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Setting up notifications...';

      try {
        const reg = await navigator.serviceWorker.register('/sw.js');
        await navigator.serviceWorker.ready;

        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          status.textContent = 'Permission denied — enable notifications in your browser settings.';
          btn.disabled = false;
          return;
        }

        let sub = await reg.pushManager.getSubscription();
        if (!sub) {
          sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
          });
        }

        await fetch(WORKER_URL + '/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub)
        });

        status.textContent = "You're in! We'll ping you when a new episode drops.";
        btn.textContent = '✓ Subscribed';
      } catch (err) {
        console.error(err);
        status.textContent = 'Something went wrong. Please try again.';
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', handleSubscribe);
  </script>

</body>
</html>
